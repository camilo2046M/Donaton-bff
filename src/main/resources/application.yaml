server:
  port: 8080

spring:
  application:
    name: donaton-bff

donaton:
  ms:
    logistica:
      url: http://localhost:8081
    necesidades:
      url: http://localhost:8082


resilience4j:
  circuitbreaker:
    instances:
      logisticaCB:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
      necesidadesCB:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.donaton: DEBUG
    org.springframework.web.client: DEBUG